name: xvfb-run
description: Run a command in a virtual X server environment
parsing: non-interspersed
flags:
  -a, --auto-servernum: Try to get a free server number (deprecated)
  -d, --auto-display: Use the X server to find a display number automatically
  -e, --error-file=: File used to store xauth errors and Xvfb output
  -f, --auth-file=: File used to store auth cookie
  -h, --help: Display usage message and exit
  -n, --server-num=: Server number to use (default 99)
  -l, --listen-tcp: Enable TCP port listening in the X server
  -p, --xauth-protocol=: X authority protocol name to use
  -s, --server-args=: Arguments to pass to the Xvfb server
  -w, --wait=: Delay in seconds to wait for Xvfb to start
completion:
  flag:
    --error-file: ["$files"]
    --auth-file: ["$files"]
