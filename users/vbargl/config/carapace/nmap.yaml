name: nmap
description: Network exploration tool and security / port scanner
parsing: non-interspersed
flags:
  -iL=: Input from list of hosts/networks
  -iR=: Choose random targets
  --exclude=: Exclude hosts/networks
  --excludefile=: Exclude list from file
  -sL: List Scan - simply list targets to scan
  -sn: Ping Scan - disable port scan
  -Pn: Treat all hosts as online -- skip host discovery
  -PS=: TCP SYN discovery to given ports
  -PA=: TCP ACK discovery to given ports
  -PU=: UDP discovery to given ports
  -PY=: SCTP discovery to given ports
  -PE: ICMP echo request discovery probe
  -PP: ICMP timestamp request discovery probe
  -PM: ICMP netmask request discovery probe
  -PO=: IP Protocol Ping
  -n: Never do DNS resolution
  -R: Always resolve
  --dns-servers=: Specify custom DNS servers
  --system-dns: Use OS's DNS resolver
  --traceroute: Trace hop path to each host
  -sS: TCP SYN scan
  -sT: TCP Connect() scan
  -sA: TCP ACK scan
  -sW: TCP Window scan
  -sM: TCP Maimon scan
  -sU: UDP Scan
  -sN: TCP Null scan
  -sF: TCP FIN scan
  -sX: TCP Xmas scan
  --scanflags=: Customize TCP scan flags
  -sI=: Idle scan
  -sY: SCTP INIT scan
  -sZ: SCTP COOKIE-ECHO scan
  -sO: IP protocol scan
  -b=: FTP bounce scan
  -p=: Only scan specified ports
  --exclude-ports=: Exclude specified ports from scanning
  -F: Fast mode - scan fewer ports
  -r: Scan ports sequentially
  --top-ports=: Scan <number> most common ports
  --port-ratio=: Scan ports more common than <ratio>
  -sV: Probe open ports to determine service/version info
  --version-intensity=: Set from 0 (light) to 9 (try all probes)
  --version-light: Limit to most likely probes (intensity 2)
  --version-all: Try every single probe (intensity 9)
  --version-trace: Show detailed version scan activity
  -sC: Equivalent to --script=default
  --script=: Run specified scripts
  --script-args=: Provide arguments to scripts
  --script-args-file=: Provide NSE script args in a file
  --script-trace: Show all data sent and received
  --script-updatedb: Update the script database
  --script-help=: Show help about scripts
  -O: Enable OS detection
  --osscan-limit: Limit OS detection to promising targets
  --osscan-guess: Guess OS more aggressively
  -T=: Set timing template (0-5)
  --min-hostgroup=: Parallel host scan group sizes
  --max-hostgroup=: Parallel host scan group sizes
  --min-parallelism=: Probe parallelization
  --max-parallelism=: Probe parallelization
  --min-rtt-timeout=: Specifies probe round trip time
  --max-rtt-timeout=: Specifies probe round trip time
  --initial-rtt-timeout=: Specifies probe round trip time
  --max-retries=: Caps number of port scan probe retransmissions
  --host-timeout=: Give up on target after this long
  --scan-delay=: Adjust delay between probes
  --max-scan-delay=: Adjust delay between probes
  --min-rate=: Send packets no slower than per second
  --max-rate=: Send packets no faster than per second
  -f: Fragment packets
  --mtu=: Set MTU
  -D=: Cloak a scan with decoys
  -S=: Spoof source address
  -e=: Use specified interface
  -g=: Use given source port number
  --source-port=: Use given source port number
  --proxies=: Relay connections through HTTP/SOCKS4 proxies
  --data=: Append a custom payload to sent packets
  --data-string=: Append a custom ASCII string to sent packets
  --data-length=: Append random data to sent packets
  --ip-options=: Send packets with specified ip options
  --ttl=: Set IP time-to-live field
  --spoof-mac=: Spoof your MAC address
  --badsum: Send packets with a bogus TCP/UDP/SCTP checksum
  -oN=: Output scan in normal format
  -oX=: Output scan in XML format
  -oS=: Output scan in s|<rIpt kIddi3 format
  -oG=: Output scan in grepable format
  -oA=: Output in the three major formats at once
  -v: Increase verbosity level
  -d: Increase debugging level
  --reason: Display the reason a port is in a particular state
  --open: Only show open (or possibly open) ports
  --packet-trace: Show all packets sent and received
  --iflist: Print host interfaces and routes
  --append-output: Append to rather than clobber output files
  --resume=: Resume an aborted scan
  --noninteractive: Disable runtime interactions via keyboard
  --stylesheet=: XSL stylesheet to transform XML output to HTML
  --webxml: Reference stylesheet from Nmap.Org
  --no-stylesheet: Prevent associating of XSL stylesheet w/XML output
  "-6": Enable IPv6 scanning
  -A: Enable OS detection, version detection, script scanning, and traceroute
  --datadir=: Specify custom Nmap data file location
  --send-eth: Send using raw ethernet frames
  --send-ip: Send using IP packets
  --privileged: Assume fully privileged
  --unprivileged: Assume user lacks raw socket privileges
  -V: Print version number
  -h: Print help summary page
completion:
  flag:
    -iL: ["$files"]
    --excludefile: ["$files"]
    -oN: ["$files"]
    -oX: ["$files"]
    -oS: ["$files"]
    -oG: ["$files"]
    -oA: ["$files"]
    --resume: ["$files"]
    --stylesheet: ["$files"]
    --datadir: ["$directories"]
    -T: ["0\tparanoid", "1\tsneaky", "2\tpolite", "3\tnormal", "4\taggressive", "5\tinsane"]
